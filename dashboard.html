<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Referral Logger"/>
<title>Omnigreen — Referral Logger</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0D1F0F; --bg2:#132915; --bg3:#1A3A1C;
  --border:#1E4020; --border2:#2A5C2D;
  --green:#3CB554; --greenD:#1D9E75; --greenM:#5DCAA5;
  --white:#E8F5E3; --white2:#B8D9BC; --white3:#5A8F5E; --white4:#3A5E3D;
  --red:#FF4D6A; --gd:#3CB554; --ss:#5DCAA5;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--white);font-family:'Inter','Helvetica Neue',Arial,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}

/* ── Header ── */
.header{background:#111;border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.logo-row{display:flex;align-items:center;gap:10px;}
.logo-mark{width:30px;height:30px;border-radius:9px;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-name{font-size:14px;font-weight:700;color:var(--white);letter-spacing:-0.02em;}
.logo-sub{font-size:9px;font-weight:600;color:var(--greenM);letter-spacing:0.07em;text-transform:uppercase;margin-top:1px;}
.logged-pill{background:rgba(60,181,84,0.15);border:1px solid rgba(60,181,84,0.35);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;color:var(--green);}

/* ── Body ── */
.body{padding:16px;max-width:480px;margin:0 auto;}
.step-label{font-size:10px;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;color:var(--white3);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.step-num{width:18px;height:18px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--greenM);flex-shrink:0;}

/* ── Company tiles ── */
.company-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.company-tile{background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:16px 12px;cursor:pointer;user-select:none;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all 0.12s;position:relative;}
.company-tile:active{transform:scale(0.96);}
.company-tile.gd.selected{background:rgba(60,181,84,0.12);border-color:var(--gd);outline:2px solid rgba(60,181,84,0.2);outline-offset:1px;}
.company-tile.ss.selected{background:rgba(93,202,165,0.12);border-color:var(--ss);outline:2px solid rgba(93,202,165,0.2);outline-offset:1px;}
.company-icon-wrap{width:46px;height:46px;border-radius:13px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--white4);transition:color 0.12s,background 0.12s;}
.company-tile.gd.selected .company-icon-wrap{color:var(--gd);background:rgba(60,181,84,0.18);}
.company-tile.ss.selected .company-icon-wrap{color:var(--ss);background:rgba(93,202,165,0.18);}
.company-name{font-size:13px;font-weight:600;color:var(--white3);text-align:center;transition:color 0.12s;}
.company-tile.gd.selected .company-name{color:var(--gd);}
.company-tile.ss.selected .company-name{color:var(--ss);}
.company-check{position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.12s;}
.company-tile.gd.selected .company-check{background:var(--gd);opacity:1;}
.company-tile.ss.selected .company-check{background:var(--ss);opacity:1;}

/* ── Divider ── */
.divider{height:1px;background:var(--border);margin:0 0 18px;}

/* ── Source grid ── */
.src-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}

.tile{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px 14px 14px;
  cursor:pointer;
  user-select:none;
  display:flex;
  flex-direction:column;
  gap:12px;
  transition:all 0.12s;
  position:relative;
  min-height:110px;
}
.tile:active{transform:scale(0.96);}
.tile.selected{
  background:rgba(60,181,84,0.1);
  border-color:var(--green);
  outline:2px solid rgba(60,181,84,0.2);
  outline-offset:1px;
}

/* icon row at top */
.tile-header{display:flex;align-items:flex-start;justify-content:space-between;}
.tile-icon{
  width:40px;height:40px;border-radius:11px;
  background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:var(--white3);
  transition:background 0.12s,color 0.12s;
  flex-shrink:0;
}
.tile.selected .tile-icon{background:rgba(60,181,84,0.18);color:var(--green);}
.tile-check-mark{
  width:18px;height:18px;border-radius:50%;
  background:var(--green);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.12s;flex-shrink:0;
}
.tile.selected .tile-check-mark{opacity:1;}

/* label + count at bottom */
.tile-footer{display:flex;flex-direction:column;gap:3px;}
.tile-label{font-size:12px;font-weight:600;color:var(--white2);line-height:1.3;}
.tile.selected .tile-label{color:var(--green);}
.tile-count{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--white4);line-height:1;}
.tile.selected .tile-count{color:var(--green);}

/* ── Confirm button ── */
.confirm-btn{width:100%;border:none;border-radius:12px;padding:17px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.15s,transform 0.08s;letter-spacing:-0.01em;margin-bottom:18px;}
.confirm-btn:active{transform:scale(0.98);}
.confirm-btn.active-gd{background:var(--gd);color:#fff;}
.confirm-btn.active-ss{background:var(--ss);color:#0D1F0F;}
.confirm-btn.inactive{background:var(--bg3);color:var(--white4);cursor:not-allowed;}

/* ── Banner ── */
.banner{border-radius:10px;padding:11px 14px;margin-bottom:14px;font-size:13px;display:none;align-items:center;gap:8px;}
.banner.show{display:flex;}
.banner.syncing{background:rgba(60,181,84,0.1);border:1px solid rgba(60,181,84,0.3);color:var(--greenM);}
.banner.done{background:rgba(60,181,84,0.12);border:1px solid rgba(60,181,84,0.3);color:var(--green);}
.banner.error{background:rgba(255,77,106,0.1);border:1px solid rgba(255,77,106,0.3);color:var(--red);}

/* ── Recent ── */
.recent-list{display:flex;flex-direction:column;gap:6px;}
.recent-row{display:flex;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:9px 12px;gap:8px;}
.recent-co-badge{font-size:9px;font-weight:700;letter-spacing:0.04em;padding:2px 7px;border-radius:4px;flex-shrink:0;text-transform:uppercase;}
.recent-co-badge.gd{background:rgba(60,181,84,0.15);color:var(--gd);border:1px solid rgba(60,181,84,0.3);}
.recent-co-badge.ss{background:rgba(93,202,165,0.15);color:var(--ss);border:1px solid rgba(93,202,165,0.3);}
.recent-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.recent-name{font-size:12px;font-weight:500;color:var(--white);flex:1;}
.recent-time{font-size:10px;color:var(--white4);font-family:'JetBrains Mono',monospace;flex-shrink:0;}
.empty-state{text-align:center;padding:24px 0;color:var(--white4);font-size:13px;}

@keyframes spin{to{transform:rotate(360deg);}}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.25);border-top-color:currentColor;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
</style>
</head>
<body>

<div class="header">
  <div class="logo-row">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 17 17" fill="none">
        <path d="M8.5 1.5C8.5 1.5 3.5 4.5 3.5 9C3.5 11 5 13 8.5 13.5C8.5 13.5 8.5 11.5 8.5 10.5" stroke="#fff" stroke-width="1.35" stroke-linecap="round"/>
        <path d="M8.5 1.5C8.5 1.5 13.5 4.5 13.5 9C13.5 11 12 13 8.5 13.5" stroke="#fff" stroke-width="1.35" stroke-linecap="round"/>
        <path d="M5.5 7C5.5 7 7 6.5 8.5 7.5C10 6.5 11.5 7 11.5 7C11.5 7 10.5 9.5 8.5 9.5C6.5 9.5 5.5 7 5.5 7Z" fill="#fff"/>
        <path d="M8.5 13.5V15.5" stroke="#fff" stroke-width="1.35" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">Omnigreen Deliveries</div>
      <div class="logo-sub">Referral Logger</div>
    </div>
  </div>
  <div class="logged-pill">Logged: <span id="logged-count">0</span></div>
</div>

<div class="body">
  <div id="banner" class="banner"></div>

  <!-- Step 1 -->
  <div class="step-label"><span class="step-num">1</span>Delivering for</div>
  <div class="company-row">
    <button class="company-tile gd" id="co-gd" onclick="selectCompany('grassdoor')" aria-label="Grassdoor">
      <div class="company-check"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2 2 4-4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="company-icon-wrap"><i class="ti ti-plant-2"></i></div>
      <div class="company-name">Grassdoor</div>
    </button>
    <button class="company-tile ss" id="co-ss" onclick="selectCompany('stashdash')" aria-label="Stashdash">
      <div class="company-check"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2 2 4-4" stroke="#0D1F0F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="company-icon-wrap"><i class="ti ti-briefcase"></i></div>
      <div class="company-name">Stashdash</div>
    </button>
  </div>

  <div class="divider"></div>

  <!-- Step 2 -->
  <div class="step-label"><span class="step-num">2</span>How did they hear about us?</div>
  <div class="src-grid" id="src-grid"></div>

  <button class="confirm-btn inactive" id="confirm-btn" onclick="logEntry()">
    Select company &amp; source to continue
  </button>

  <div class="step-label" style="margin-bottom:8px">Recent entries</div>
  <div class="recent-list" id="recent-list">
    <div class="empty-state">No entries yet — log your first delivery above.</div>
  </div>
</div>

<script>
const SOURCES=[
  {id:'yelp',      label:'Yelp',             icon:'ti-star'},
  {id:'wom',       label:'Word of mouth',    icon:'ti-messages'},
  {id:'weedmaps',  label:'Weedmaps',         icon:'ti-map-pin'},
  {id:'leafly',    label:'Leafly',           icon:'ti-leaf'},
  {id:'mailer',    label:'Mailer / Hand out',icon:'ti-mail'},
  {id:'instagram', label:'Instagram',        icon:'ti-brand-instagram'},
  {id:'google',    label:'Google',           icon:'ti-brand-google'},
  {id:'friendfam', label:'Friend / Family',  icon:'ti-users'},
  {id:'facebook',  label:'Facebook',         icon:'ti-brand-facebook'},
];
const SRC_COLORS=['#3CB554','#5DCAA5','#FFB547','#8B6FE8','#4FC3F7','#FF8A65','#81C784','#F06292','#FFD54F'];

let selectedCompany=null,selectedSource=null,sessionCount=0;
const counts=(()=>{try{return JSON.parse(localStorage.getItem('og_counts_v3')||'{}');}catch{return{};}})();
const recent=(()=>{try{return JSON.parse(localStorage.getItem('og_recent_v3')||'[]');}catch{return[];}})();
function save(){try{localStorage.setItem('og_counts_v3',JSON.stringify(counts));localStorage.setItem('og_recent_v3',JSON.stringify(recent.slice(0,30)));}catch{}}

function buildGrid(){
  const grid=document.getElementById('src-grid');
  grid.innerHTML='';
  SOURCES.forEach((s,i)=>{
    const btn=document.createElement('button');
    btn.className='tile';btn.id='tile-'+s.id;btn.setAttribute('aria-label',s.label);
    btn.innerHTML=`
      <div class="tile-header">
        <div class="tile-icon"><i class="ti ${s.icon}"></i></div>
        <div class="tile-check-mark">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2 2 4-4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="tile-footer">
        <span class="tile-label">${s.label}</span>
        <span class="tile-count" id="cnt-${s.id}">${counts[s.id]||0}</span>
      </div>`;
    btn.addEventListener('click',()=>selectSource(s.id));
    grid.appendChild(btn);
  });
}

function selectCompany(id){
  selectedCompany=(selectedCompany===id)?null:id;
  document.getElementById('co-gd').classList.toggle('selected',selectedCompany==='grassdoor');
  document.getElementById('co-ss').classList.toggle('selected',selectedCompany==='stashdash');
  updateBtn();
}

function selectSource(id){
  selectedSource=(selectedSource===id)?null:id;
  SOURCES.forEach(s=>document.getElementById('tile-'+s.id).classList.toggle('selected',s.id===selectedSource));
  updateBtn();
}

function updateBtn(){
  const btn=document.getElementById('confirm-btn');
  if(selectedCompany&&selectedSource){
    const coClass=selectedCompany==='grassdoor'?'active-gd':'active-ss';
    btn.className=`confirm-btn ${coClass}`;
    btn.innerHTML=`<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.4"/><path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>Confirm entry selection`;
  } else if(!selectedCompany&&!selectedSource){
    btn.className='confirm-btn inactive';btn.innerHTML='Select company &amp; source to continue';
  } else if(!selectedCompany){
    btn.className='confirm-btn inactive';btn.innerHTML='Select a company first';
  } else {
    btn.className='confirm-btn inactive';btn.innerHTML='Select a source to continue';
  }
}

async function logEntry(){
  if(!selectedCompany||!selectedSource)return;
  const src=SOURCES.find(s=>s.id===selectedSource);
  const coLabel=selectedCompany==='grassdoor'?'Grassdoor':'Stashdash';
  const ts=Date.now();
  counts[src.id]=(counts[src.id]||0)+1;
  sessionCount++;
  recent.unshift({source:src.id,label:src.label,company:selectedCompany,coLabel,ts});
  save();
  document.getElementById('cnt-'+src.id).textContent=counts[src.id];
  document.getElementById('logged-count').textContent=sessionCount;
  renderRecent();
  selectSource(null);
  showBanner('syncing','Syncing to Airtable\u2026');
  try{
    const now=new Date(ts);const pad=n=>String(n).padStart(2,'0');
    const loggedAt=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    const dateOnly=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
    const res=await fetch('/api/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({source:src.label,channel:src.label,company:coLabel,loggedAt,date:dateOnly})});
    if(res.ok){showBanner('done',`\u2713  Saved \u2014 ${coLabel} \u00b7 ${src.label}`);}
    else{showBanner('error','\u26a0  Saved locally \u2014 sync failed');}
  }catch{showBanner('error','\u26a0  Offline \u2014 saved locally');}
}

let bannerTimer=null;
function showBanner(type,msg){
  const b=document.getElementById('banner');
  b.className=`banner show ${type}`;
  b.innerHTML=type==='syncing'?`<div class="spinner"></div>${msg}`:msg;
  clearTimeout(bannerTimer);
  if(type!=='syncing')bannerTimer=setTimeout(()=>{b.className='banner';},3000);
}

function fmtTime(ts){
  const d=new Date(ts),now=new Date();
  if(d.toDateString()===now.toDateString())return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function renderRecent(){
  const list=document.getElementById('recent-list');
  if(!recent.length){list.innerHTML='<div class="empty-state">No entries yet \u2014 log your first delivery above.</div>';return;}
  list.innerHTML=recent.slice(0,10).map(e=>{
    const idx=SOURCES.findIndex(s=>s.id===e.source);
    const color=SRC_COLORS[idx]||'#3CB554';
    const co=e.company==='grassdoor'?'gd':'ss';
    return `<div class="recent-row"><div class="recent-dot" style="background:${color}"></div><span class="recent-co-badge ${co}">${e.coLabel}</span><span class="recent-name">${e.label}</span><span class="recent-time">${fmtTime(e.ts)}</span></div>`;
  }).join('');
}

buildGrid();renderRecent();
const today=new Date().toDateString();
sessionCount=recent.filter(e=>new Date(e.ts).toDateString()===today).length;
document.getElementById('logged-count').textContent=sessionCount;
</script>
</body>
</html>
